<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Roundtable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Roboto"', 'sans-serif'],
              serif: ['"Roboto"', 'sans-serif'],
            },
            colors: {
              // Material Design 3 Dark Theme tokens
              'md-surface': '#121212', 
              'md-surface-container': '#1E1E1E', // Cards, Input
              'md-surface-container-low': '#2C2C2C', // Bubbles
              'md-primary': '#E2E2E2', // Primary Text
              'md-primary-container': '#4A4458', 
              'md-secondary': '#A0A0A0', // Secondary Text
              'md-tertiary': '#D0BCFF', // Accents
              'md-outline': '#8C8C8C',
              'md-accent': '#BB86FC', // Bright accent for actions
            },
            boxShadow: {
              'elevation-1': '0px 1px 3px 1px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.6)',
              'elevation-2': '0px 2px 6px 2px rgba(0, 0, 0, 0.3), 0px 1px 2px 0px rgba(0, 0, 0, 0.6)',
              'elevation-3': '0px 4px 8px 3px rgba(0, 0, 0, 0.3), 0px 1px 3px 0px rgba(0, 0, 0, 0.6)',
              'glow': '0 0 15px rgba(187, 134, 252, 0.3)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #121212;
        color: #E2E2E2;
        font-family: 'Roboto', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      /* Hide scrollbar but allow scroll */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(187, 134, 252, 0.1); }
        50% { opacity: .9; box-shadow: 0 0 20px rgba(187, 134, 252, 0.4); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>

</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
